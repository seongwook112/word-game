<style>

const state = { idx: -1 };

const app = document.getElementById("app");

const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function choseongHint(word) {
  return [...word].map(ch => {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code >= 0 && code <= 11171) return CHO[Math.floor(code / 588)];
    return "◦";
  }).join(" ");
}

function renderStart() {
  app.innerHTML = `
    <div class="center-screen">
      <div class="big-emoji">🧓🤝🧑</div>
      <h1>세대공감 신조어 퀴즈</h1>
      <div class="sub">1980년대 유행어부터 2026년 최신 밈까지,\n추억의 신조어 10문제 + 요즘 신조어 10문제!\n\n옛날 사람 🤝 요즘 사람이\n머리를 맞대고 정답을 외쳐보세요.</div>
      <button class="primary-btn" onclick="startQuiz()">시작하기</button>
    </div>`;
}

function startQuiz() {
  state.idx = 0;
  renderTeaser();
}

function renderTeaser() {
  const q = QUESTIONS[state.idx];
  app.innerHTML = `
    <div class="teaser">
      <span class="gen-badge ${q.gen === 0 ? "old" : "new"}">${GEN_LABEL[q.gen]}</span>
      <div class="year">${q.tag}</div>
    </div>`;
  window.scrollTo(0, 0);
  setTimeout(renderQuestion, 2000);
}

function renderQuestion() {
  const q = QUESTIONS[state.idx];
  const n = state.idx + 1;

  app.innerHTML = `
    <div class="counter">${n}/${QUESTIONS.length}</div>
    <div class="progress"><div class="progress-bar" style="width:${(n - 1) / QUESTIONS.length * 100}%"></div></div>
    <span class="gen-badge ${q.gen === 0 ? "old" : "new"}">${GEN_LABEL[q.gen]} · ${q.tag}</span>
    <div class="hero">
      <div class="emoji-card"><div class="e">${q.emoji}</div><div class="t">${q.tag}</div></div>
    </div>
    <div class="qnum">Q${n}.</div>
    <div class="qtext">${q.q}</div>
    <button class="reveal-btn" id="revealBtn" onclick="reveal()">정답 보기</button>
    <button class="hint-btn" id="hintBtn" onclick="showHint()">초성 힌트 보기</button>
    <div class="hint-box" id="hintBox"></div>
    <div class="verdict" id="verdict"></div>
    <div class="explain" id="explain"></div>
    <button class="next-btn" id="nextBtn" onclick="next()">다음 문제 →</button>`;

  requestAnimationFrame(() => {
    document.querySelector(".progress-bar").style.width = `${n / QUESTIONS.length * 100}%`;
  });
  window.scrollTo(0, 0);
}

function showHint() {
  const q = QUESTIONS[state.idx];
  document.getElementById("hintBox").textContent = choseongHint(q.answers[0]);
  document.getElementById("hintBtn").style.display = "none";
}

function reveal() {
  const q = QUESTIONS[state.idx];
  document.getElementById("revealBtn").style.display = "none";
  document.getElementById("hintBtn").style.display = "none";

  const verdict = document.getElementById("verdict");
  verdict.innerHTML = `정답은 <span class="ans">${q.answers[0]}</span>`;
  verdict.style.display = "block";

  const ex = document.getElementById("explain");
  ex.innerHTML = `<img src="img/${q.img}" alt="" onerror="this.remove()">${q.explain}`;
  ex.style.display = "block";

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = state.idx === QUESTIONS.length - 1 ? "결과 보기 🎉" : "다음 문제 →";
  nextBtn.style.display = "block";
  nextBtn.scrollIntoView({ behavior: "smooth", block: "end" });
}

function next() {
  state.idx++;
  if (state.idx >= QUESTIONS.length) return renderResult();
  renderTeaser();
}

function renderResult() {
  app.innerHTML = `
    <div class="center-screen">
      <div class="big-emoji">🎉</div>
      <h1>수고하셨습니다!</h1>
      <div class="sub">1980년대부터 2026년까지,\n${QUESTIONS.length}개의 신조어를 모두 만나봤어요.\n옛날 사람 🤝 요즘 사람, 서로에게 고마워하세요!</div>
      <button class="primary-btn" onclick="startQuiz()">다시 하기</button>
    </div>`;
}

renderStart();
</script>
</body>
</html>
