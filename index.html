  {
    gen: 1, tag: "2020s", img: "iwaejin.jpg", emoji: "😲❗",
    q: "믿기 힘든 일이 실제로 벌어졌을 때 쓰는\n'이왜진'의 뜻은?",
    choices: ["이게 왜 진짜?", "이건 왜 진행이 안 돼?", "이 정도면 왜구 진출", "이번엔 왜 진 거야?"],
    answer: 0,
    explain: "<b>이왜진 = 이게 왜 진짜?</b> 농담인 줄 알았던 게 사실로 밝혀졌을 때의 충격을 담은 말. \"이왜진ㅋㅋ\" 한마디면 놀라움 표현 끝."
  },
];

const state = { idx: -1, score: 0, genScore: [0, 0], shuffled: [] };

function shuffleChoices(q) {
  const order = q.choices.map((_, i) => i).sort(() => Math.random() - 0.5);
  return { order, answerPos: order.indexOf(q.answer) };
}

const app = document.getElementById("app");

function renderStart() {
  app.innerHTML = `
    <div class="center-screen">
      <div class="big-emoji">🧓🤝🧑</div>
      <h1>세대공감 신조어 퀴즈</h1>
      <div class="sub">1980년대 유행어부터 2026년 최신 밈까지,\n추억의 신조어 10문제 + 요즘 신조어 10문제!\n\n옛날 사람 🤝 요즘 사람이 짝을 이뤄\n서로의 시대를 얼마나 아는지 확인해보세요.</div>
      <button class="primary-btn" onclick="startQuiz()">시작하기</button>
    </div>`;
}

function startQuiz() {
  state.idx = 0; state.score = 0; state.genScore = [0, 0];
  state.shuffled = QUESTIONS.map(shuffleChoices);
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[state.idx];
  const sh = state.shuffled[state.idx];
  const n = state.idx + 1;

  app.innerHTML = `
    <div class="counter">${n}/${QUESTIONS.length}</div>
    <div class="progress"><div class="progress-bar" style="width:${(n - 1) / QUESTIONS.length * 100}%"></div></div>
    <span class="gen-badge ${q.gen === 0 ? "old" : "new"}">${GEN_LABEL[q.gen]} · ${q.tag}</span>
    <div class="hero">
      <img src="img/${q.img}" alt="" onerror="this.outerHTML='<div class=&quot;emoji-card&quot;><div class=&quot;e&quot;>${q.emoji}</div><div class=&quot;t&quot;>${q.tag}</div></div>'">
    </div>
    <div class="qnum">Q${n}.</div>
    <div class="qtext">${q.q}</div>
    <div class="choices">
      ${sh.order.map((orig, pos) =>
        `<button class="choice" onclick="pick(${pos})">${q.choices[orig]}</button>`).join("")}
    </div>
    <div class="explain" id="explain"></div>
    <button class="next-btn" id="nextBtn" onclick="next()">다음 문제 →</button>`;

  requestAnimationFrame(() => {
    document.querySelector(".progress-bar").style.width = `${n / QUESTIONS.length * 100}%`;
  });
  window.scrollTo(0, 0);
}

function pick(pos) {
  const q = QUESTIONS[state.idx];
  const sh = state.shuffled[state.idx];
  const btns = document.querySelectorAll(".choice");
  btns.forEach(b => b.disabled = true);

  const correct = pos === sh.answerPos;
  if (correct) { state.score++; state.genScore[q.gen]++; }

  btns.forEach((b, i) => {
    if (i === sh.answerPos) b.classList.add("correct");
    else if (i === pos) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  const ex = document.getElementById("explain");
  ex.innerHTML = `${correct ? "⭕ <b>정답!</b>" : "❌ <b>아쉽!</b>"} &nbsp;${q.explain}`;
  ex.style.display = "block";
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = state.idx === QUESTIONS.length - 1 ? "결과 보기 🎉" : "다음 문제 →";
  nextBtn.style.display = "block";
  nextBtn.scrollIntoView({ behavior: "smooth", block: "end" });
}

function next() {
  state.idx++;
  if (state.idx >= QUESTIONS.length) return renderResult();
  renderQuestion();
}

function renderResult() {
  const s = state.score;
  const grade =
    s >= 18 ? ["🏆 세대통합 마스터", "80년대부터 2026년까지, 당신들은 살아있는 국어사전!"] :
    s >= 14 ? ["😎 환상의 짝꿍", "어느 세대와 대화해도 막힘이 없는 콤비!"] :
    s >= 9  ? ["🙂 평범한 현대인 콤비", "내 세대는 확실하게, 상대 세대는 어렴풋이!"] :
              ["🐣 신조어 새싹들", "괜찮아요, 오늘부터 배우면 완전 럭키비키잖아🍀"];

  app.innerHTML = `
    <div class="center-screen">
      <div class="big-emoji">🎉</div>
      <h1>결과 발표</h1>
      <div class="score-big">${s} / ${QUESTIONS.length}</div>
      <div class="grade">${grade[0]}</div>
      <div class="sub">${grade[1]}</div>
      <div class="gen-breakdown">
        <div class="row"><span>🕰️ 추억의 신조어 (80~00년대)</span><b>${state.genScore[0]} / 10</b></div>
        <div class="row"><span>⚡ 요즘 신조어 (10년대~현재)</span><b>${state.genScore[1]} / 10</b></div>
        <div class="hint">추억 점수가 높으면 요즘 파트너 덕, 요즘 점수가 높으면 옛날 파트너 덕! 서로에게 고마워하세요 🤝</div>
      </div>
      <button class="primary-btn" onclick="startQuiz()">다시 도전!</button>
    </div>`;
}

renderStart();
</script>
</body>
</html>
